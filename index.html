<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeAspirations</title>
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<link rel="apple-touch-icon" href="favicon.jpg">
<style>
  :root {
    --bg: #f2efe7;
    --panel: #ffffff;
    --ink: #1f1f1f;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    position: relative;
    overflow: auto;
    background:
      linear-gradient(180deg, rgba(255, 252, 246, 0.34), rgba(242, 236, 224, 0.42)),
      url("lifetree.png") center center / cover no-repeat fixed;
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.22), transparent 34%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(247, 241, 232, 0.28));
    backdrop-filter: blur(2px) saturate(0.9) brightness(1.02);
    pointer-events: none;
    z-index: 0;
  }

  body > * {
    position: relative;
    z-index: 1;
  }

  .app {
    width: min(980px, calc(100vw - 32px));
    padding: 28px 26px 64px;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(31, 31, 31, 0.05);
    border-radius: 20px;
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.12);
    backdrop-filter: blur(6px);
  }

  .sliders {
    display: grid;
    grid-template-columns: repeat(5, minmax(108px, 1fr));
    gap: 18px;
    align-items: end;
  }

  .slider {
    --accent: #2f8f46;
    --track: #d5d0c6;
    position: relative;
    height: 600px;
    min-width: 108px;
    display: flex;
    justify-content: center;
  }

  .rail {
    position: absolute;
    left: 50%;
    top: 0;
    width: 6px;
    height: 100%;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #9f9788, var(--track));
    border-radius: 999px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
  }

  .range {
    position: absolute;
    left: 50%;
    top: 0;
    width: 6px;
    height: 100%;
    transform: translateX(-50%);
    border-radius: 999px;
    pointer-events: none;
  }

  .handle {
    position: absolute;
    left: 50%;
    width: 32px;
    height: 32px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    touch-action: none;
    user-select: none;
    cursor: grab;
    transition: transform 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
  }

  .handle:active {
    cursor: grabbing;
    transform: translate(-50%, -50%) scale(0.98);
  }

  .handle.full {
    background: var(--accent);
    box-shadow:
      0 5px 12px rgba(0, 0, 0, 0.12),
      0 0 0 6px color-mix(in srgb, var(--accent) 14%, transparent);
  }

  .handle.empty {
    background: rgba(255, 255, 255, 0.92);
    border: 4px solid var(--track);
    box-shadow:
      0 5px 12px rgba(0, 0, 0, 0.08),
      0 0 0 6px rgba(255, 255, 255, 0.1);
  }

  .handle.blocked {
    opacity: 0.56;
    cursor: not-allowed;
  }

  .handle.blocked:active {
    transform: translate(-50%, -50%);
  }

  .lock {
    position: absolute;
    left: calc(50% + 18px);
    top: 0;
    width: 18px;
    height: 18px;
    transform: translateY(-50%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 150ms ease, transform 150ms ease;
  }

  .lock::before,
  .lock::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border: 2px solid color-mix(in srgb, var(--accent) 70%, black);
  }

  .lock::before {
    top: 6px;
    width: 12px;
    height: 10px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.36);
    backdrop-filter: blur(2px);
  }

  .lock::after {
    top: 0;
    width: 10px;
    height: 9px;
    border-bottom: 0;
    border-radius: 8px 8px 0 0;
    background: transparent;
  }

  .handle.blocked + .lock {
    opacity: 0.8;
    transform: translateY(-50%) translateX(1px);
  }

  .marker {
    position: absolute;
    left: 50%;
    top: calc(100% + 24px);
    transform: translateX(-50%);
    width: 54px;
    height: 54px;
    display: grid;
    place-items: center;
    color: var(--accent);
  }

  .marker.symbol {
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
  }

  .marker svg {
    width: 34px;
    height: 34px;
    display: block;
    fill: currentColor;
    stroke: currentColor;
  }

  .marker.black {
    color: #111;
  }

  .marker.teal {
    color: #1a8e8f;
  }

  .marker.brown {
    color: #8a5b37;
  }

  .marker.red {
    color: #d63a3a;
  }

  .marker.green {
    color: #2f8f46;
  }

  .marker.black .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: currentColor;
  }

  @media (max-width: 880px) {
    .app {
      width: calc(100vw - 20px);
      padding: 18px 14px 16px;
    }

    .sliders {
      grid-template-columns: repeat(2, minmax(120px, 1fr));
    }
  }

  @media (max-width: 540px) {
    .app {
      overflow: hidden;
    }

    .sliders {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .slider {
      height: 250px;
      min-width: 0;
    }

    .handle {
      width: 24px;
      height: 24px;
    }

    .handle.full {
      box-shadow:
        0 4px 10px rgba(0, 0, 0, 0.12),
        0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent);
    }

    .handle.empty {
      box-shadow:
        0 4px 10px rgba(0, 0, 0, 0.08),
        0 0 0 4px rgba(255, 255, 255, 0.1);
    }

    .marker {
      width: 32px;
      height: 32px;
      top: auto;
      bottom: 3%;
    }

    .marker.symbol {
      font-size: 22px;
    }

    .marker svg {
      width: 24px;
      height: 24px;
    }

    .marker.black .dot {
      width: 10px;
      height: 10px;
    }
  }
</style>
</head>
<body>

<main class="app sliders" id="app" aria-label="LifeAspirations"></main>

<script>
  const app = document.getElementById("app");

  const sliders = [
    {
      id: "green",
      accent: "#37a24a",
      marker: "€"
    },
    {
      id: "red",
      accent: "#dd4444",
      marker: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 20.7 4.7 13.4c-2.1-2.1-2.1-5.5 0-7.6 2-2 5.2-2.1 7.3-.3 2.1-1.8 5.3-1.7 7.3.3 2.1 2.1 2.1 5.5 0 7.6L12 20.7Z"></path>
        </svg>
      `
    },
    {
      id: "black",
      accent: "#111111",
      marker: `<div class="dot" aria-hidden="true"></div>`
    },
    {
      id: "brown",
      accent: "#8b5a3c",
      marker: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3.3 3 11h2v9h6.2v-5.8h3.6V20H21v-9h2L12 3.3Z"></path>
          <path d="M9.1 20v-5.8h5.8V20H9.1Z"></path>
        </svg>
      `
    },
    {
      id: "teal",
      accent: "#1b8e90",
      marker: `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 4 2.8 8.3 12 12.6l9.2-4.3L12 4Z"></path>
          <path d="M6.2 10.7 12 13.4l5.8-2.7v3.2c0 1.6-2.6 3-5.8 3s-5.8-1.4-5.8-3v-3.2Z"></path>
          <path d="M18.8 10.3v6.2h1.2v-6.2h-1.2Z"></path>
        </svg>
      `
    }
  ];

  const positions = {
    full: 70,
    empty: 30
  };
  const storageKey = "double-circle-sliders-state";
  const savedState = loadState();

  sliders.forEach((config, index) => {
    const slider = document.createElement("section");
    slider.className = "slider";
    slider.style.setProperty("--accent", config.accent);
    slider.dataset.sliderId = config.id;

    slider.innerHTML = `
      <div class="rail"></div>
      <div class="range"></div>
      <div class="handle empty" role="slider" aria-label="Handle gol"></div>
      <div class="lock" aria-hidden="true"></div>
      <div class="handle full" role="slider" aria-label="Handle plin"></div>
      <div class="marker ${index === 0 ? "green symbol" : index === 1 ? "red" : index === 2 ? "black" : index === 3 ? "brown" : "teal"}">
        ${config.marker}
      </div>
    `;

    const empty = slider.querySelector(".handle.empty");
    const full = slider.querySelector(".handle.full");
    const range = slider.querySelector(".range");
    const lock = slider.querySelector(".lock");
    const initial = savedState[config.id] || { empty: positions.empty, full: positions.full, blocked: false };

    empty.style.top = `${initial.empty}%`;
    full.style.top = `${initial.full}%`;
    empty.classList.toggle("blocked", Boolean(initial.blocked));
    empty.setAttribute("aria-disabled", String(Boolean(initial.blocked)));
    syncRange(range, full, config.accent);
    lock.style.top = empty.style.top;

    makeDraggable(empty, slider, range, config.accent);
    makeDraggable(full, slider, range, config.accent);

    slider.addEventListener("pointerup", () => {
      saveSliderState(slider);
    });

    slider.addEventListener("pointercancel", () => {
      saveSliderState(slider);
    });

    slider.addEventListener("pointermove", () => {
      lock.style.top = empty.style.top;
    });

    app.appendChild(slider);
  });

  function makeDraggable(handle, slider, range, accent) {
    const isEmptyHandle = handle.classList.contains("empty");
    const tapState = {
      lastTapAt: 0,
      pointerId: null,
      startX: 0,
      startY: 0,
      moved: false
    };

    handle.addEventListener("pointerdown", (event) => {
      if (handle.classList.contains("blocked")) return;

      if (isEmptyHandle) {
        tapState.pointerId = event.pointerId;
        tapState.startX = event.clientX;
        tapState.startY = event.clientY;
        tapState.moved = false;
      }

      handle.setPointerCapture(event.pointerId);

      const move = (moveEvent) => {
        const rect = slider.getBoundingClientRect();
        const offset = handle.offsetHeight / 2;
        const y = Math.max(offset, Math.min(rect.height - offset, moveEvent.clientY - rect.top));
        handle.style.top = `${(y / rect.height) * 100}%`;
        if (isEmptyHandle && moveEvent.pointerId === tapState.pointerId) {
          const distance = Math.hypot(moveEvent.clientX - tapState.startX, moveEvent.clientY - tapState.startY);
          if (distance > 8) tapState.moved = true;
        }
        syncRange(range, slider.querySelector(".handle.full"), accent);
        const lock = slider.querySelector(".lock");
        lock.style.top = slider.querySelector(".handle.empty").style.top;
      };

      const stop = () => {
        handle.removeEventListener("pointermove", move);
        handle.removeEventListener("pointerup", stop);
        handle.removeEventListener("pointercancel", stop);
        syncRange(range, slider.querySelector(".handle.full"), accent);
        if (isEmptyHandle && event.pointerId === tapState.pointerId && !tapState.moved) {
          const now = performance.now();
          const isDoubleTap = now - tapState.lastTapAt < 320;
          tapState.lastTapAt = now;

          if (isDoubleTap) {
            const empty = slider.querySelector(".handle.empty");
            const lock = slider.querySelector(".lock");
            empty.classList.toggle("blocked");
            empty.setAttribute("aria-disabled", String(empty.classList.contains("blocked")));
            lock.style.top = empty.style.top;
            saveSliderState(slider);
          }
        }
        saveSliderState(slider);
      };

      handle.addEventListener("pointermove", move);
      handle.addEventListener("pointerup", stop);
      handle.addEventListener("pointercancel", stop);
    });
  }

  function syncRange(range, fullHandle, accent) {
    const fullY = parseFloat(fullHandle.style.top);
    const softAccent = `color-mix(in srgb, ${accent} 20%, white)`;
    range.style.background = `linear-gradient(to bottom, ${softAccent} 0%, ${softAccent} ${fullY}%, ${accent} ${fullY}%, ${accent} 100%)`;
  }

  function saveSliderState(slider) {
    const id = slider.dataset.sliderId;
    const empty = slider.querySelector(".handle.empty");
    const full = slider.querySelector(".handle.full");
    const state = loadState();

    state[id] = {
      empty: parseFloat(empty.style.top),
      full: parseFloat(full.style.top),
      blocked: empty.classList.contains("blocked")
    };

    localStorage.setItem(storageKey, JSON.stringify(state));
  }

  function loadState() {
    try {
      return JSON.parse(localStorage.getItem(storageKey)) || {};
    } catch {
      return {};
    }
  }
</script>

</body>
</html>
